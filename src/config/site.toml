# ============================================================
# NAVFOLIO — SITE CONFIG
# ============================================================

[config.site]
title           = "Sarper Dündar"
description     = "Technical Artist. Unity tools and shaders for indie games."
pageTitle       = "Sarper Dündar — Technical Artist"
pageDescription = "Technical Artist building Unity tools and shaders for indie games."
repository      = "https://github.com/sarperdundar/portfolio"
footerNote      = "Sarper Dündar"

# ============================================================
# YOUR PROFILE
# ============================================================

[config.profile]
name     = "Sarper Dündar"
handle   = "sarperdundar"
role     = "Technical Artist"
company  = "Masingan Studio"
location = "Bursa, Turkey"
email    = "sarperdundar@gmail.com"
website  = "https://github.com/sarperdundar"
github   = "https://github.com/sarperdundar"
meta     = "Unity tools and shaders for indie games"


# ============================================================
# TOP NAVIGATION LINKS
# ============================================================

[[config.topNav.links]]
label = "Home"
href  = "/"

[[config.topNav.links]]
label = "Projects"
href  = "/projects"

[[config.topNav.links]]
label = "Blog"
href  = "/blog"

[[config.topNav.links]]
label = "About"
href  = "/about"

# ============================================================
# THEME — Options: green-soft | green-vivid | rose-soft | pink-soft
#                  purple-soft | blue-soft | orange-soft | brown-soft
# ============================================================

[config.theme]
palette = "blue-soft"

# ============================================================
# SEARCH
# ============================================================

[config.search]
enabled     = true
shortcut    = "mod+k"
placeholder = "Search projects and posts..."
maxResults  = 6

# ============================================================
# COMMENTS — off for now
# ============================================================

[config.comments]
enabled       = false
provider      = "none"
show_on_posts = false

# ============================================================
# HOME PAGE CONTENT
# ============================================================

[config.home]
layout = "grid"

[config.home.quote]
text  = ["Technical Artist. Unity tools and shaders for indie games."]
image = ""

[config.home.intro]
title = "I'm Sarper Dündar"
name  = "Sarper Dündar"
body  = [
  "I build Unity tools and VFX assets for indie developers — performance-first, low-poly-friendly, URP-native.",
  "Currently publishing on the Unity Asset Store under the Masingan studio name while working toward a tech art role at a strategy game studio.",
]
image = ""

# Navigation cards on the homepage sidebar
[[config.home.navigation]]
icon     = "folder"
title    = "Projects"
subtitle = "Unity tools and shaders"
href     = "/projects"

[[config.home.navigation]]
icon     = "pen"
title    = "Blog"
subtitle = "Dev notes and writeups"
href     = "/blog"

[[config.home.navigation]]
icon     = "compass"
title    = "About"
subtitle = "Background and contact"
href     = "/about"

# Connect / social links
[[config.home.connect]]
label = "GitHub"
href  = "https://github.com/sarperdundar"
icon  = "github"

[[config.home.connect]]
label = "Email"
href  = "mailto:sarperdundar@gmail.com"
icon  = "mail"

# The "currently working on" list
[[config.home.doing]]
text = "Low Poly Wet Surfaces — Unity Asset Store (WIP)"
mark = "WIP"

[[config.home.doing]]
text = "Surface Text Placer — submitting to Asset Store"
mark = "Soon"

[[config.home.doing]]
text = "Grand strategy map rendering — learning JFA and compute shaders"
